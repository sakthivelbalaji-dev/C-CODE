  <body>
    <div id="root"></div>
    <noscript>
      <p style="font-family: system-ui, sans-serif; padding: 2rem">Enable JavaScript to use C Code Lab.</p>
    </noscript>
    <script nomodule>
      document.body.innerHTML =
        '<p style="font-family:system-ui,sans-serif;padding:2rem;max-width:40rem;">' +
        'This app needs a recent browser with JavaScript enabled (ES modules). ' +
        'Update your browser or turn on JavaScript, then reload.</p>';
    </script>
    <script>
      (function () {
        var IDLE_TIMEOUT_MS = Number(window.__CCODELAB_IDLE_TIMEOUT_MS || 15 * 60 * 1000);
        var timerId = null;

        function forceSignOut() {
          try {
            localStorage.clear();
            sessionStorage.clear();
          } catch (e) {
            // Ignore storage access errors (private mode/blocked storage).
          }
          window.location.replace('/login');
        }

        function resetIdleTimer() {
          if (timerId !== null) {
            window.clearTimeout(timerId);
          }
          timerId = window.setTimeout(forceSignOut, IDLE_TIMEOUT_MS);
        }

        ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'].forEach(function (eventName) {
          window.addEventListener(eventName, resetIdleTimer, { passive: true });
        });
        window.addEventListener('focus', resetIdleTimer);
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') {
            resetIdleTimer();
          }
        });

        resetIdleTimer();
      })();
    </script>
    <script>
      (function () {
        var freezeTimer = false;
        var frozenText = null;
        var timerRegex = /time\s*left\s*:?\s*\d{1,2}:\d{2}/i;
        var fallbackRegex = /time\s+left\s*:/i;

        function findTimerNodes() {
          var all = document.querySelectorAll("*");
          var matches = [];
          for (var i = 0; i < all.length; i++) {
            var node = all[i];
            if (!node) {
              continue;
            }
            var text = (node.textContent || "").trim();
            if (!text) {
              continue;
            }
            if (timerRegex.test(text) || fallbackRegex.test(text)) {
              matches.push(node);
            }
          }
          return matches;
        }

        function pickFrozenText(nodes) {
          for (var i = 0; i < nodes.length; i++) {
            var text = (nodes[i].textContent || "").trim();
            if (timerRegex.test(text)) {
              return text;
            }
          }
          return nodes.length > 0 ? (nodes[0].textContent || "").trim() : null;
        }

        function applyFreeze() {
          if (!freezeTimer) {
            return;
          }
          var nodes = findTimerNodes();
          if (!nodes.length) {
            return;
          }
          if (!frozenText) {
            frozenText = pickFrozenText(nodes);
          }
          if (!frozenText) {
            return;
          }
          for (var i = 0; i < nodes.length; i++) {
            if ((nodes[i].textContent || "").trim() !== frozenText) {
              nodes[i].textContent = frozenText;
            }
          }
        }

        function markAccepted(data) {
          if (!data || typeof data !== "object") {
            return;
          }
          if (data.status === "Accepted") {
            freezeTimer = true;
            applyFreeze();
            return;
          }
          if (
            typeof data.passed_case_count === "number" &&
            typeof data.total_case_count === "number" &&
            data.total_case_count > 0 &&
            data.passed_case_count === data.total_case_count
          ) {
            freezeTimer = true;
            applyFreeze();
          }
        }

        var originalFetch = window.fetch;
        window.fetch = function (input, init) {
          var requestUrl = "";
          if (typeof input === "string") {
            requestUrl = input;
          } else if (input && input.url) {
            requestUrl = input.url;
          }
          return originalFetch.call(this, input, init).then(function (response) {
            try {
              if (!/\/api\/judge\/c(\?|$)/.test(requestUrl)) {
                return response;
              }
              response
                .clone()
                .json()
                .then(function (data) {
                  markAccepted(data);
                })
                .catch(function () {});
            } catch (e) {}
            return response;
          });
        };

        setInterval(applyFreeze, 100);
      })();
    </script>
  </body>
</html>
