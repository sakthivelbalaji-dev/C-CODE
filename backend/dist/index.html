  <body>
    <div id="root"></div>
    <noscript>
      <p style="font-family: system-ui, sans-serif; padding: 2rem">Enable JavaScript to use C Code Lab.</p>
    </noscript>
    <script nomodule>
      document.body.innerHTML =
        '<p style="font-family:system-ui,sans-serif;padding:2rem;max-width:40rem;">' +
        'This app needs a recent browser with JavaScript enabled (ES modules). ' +
        'Update your browser or turn on JavaScript, then reload.</p>';
    </script>
    <script>
      (function () {
        var IDLE_TIMEOUT_MS = Number(window.__CCODELAB_IDLE_TIMEOUT_MS || 15 * 60 * 1000);
        var timerId = null;

        function forceSignOut() {
          try {
            localStorage.clear();
            sessionStorage.clear();
          } catch (e) {
            // Ignore storage access errors (private mode/blocked storage).
          }
          window.location.replace('/login');
        }

        function resetIdleTimer() {
          if (timerId !== null) {
            window.clearTimeout(timerId);
          }
          timerId = window.setTimeout(forceSignOut, IDLE_TIMEOUT_MS);
        }

        ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click'].forEach(function (eventName) {
          window.addEventListener(eventName, resetIdleTimer, { passive: true });
        });
        window.addEventListener('focus', resetIdleTimer);
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') {
            resetIdleTimer();
          }
        });

        resetIdleTimer();
      })();
    </script>
    <script>
      (function () {
        var freezeTimer = false;
        var frozenNow = null;
        var gateActive = false;
        var gateFrozenNow = null;
        /** Increments whenever the code editor mounts or the URL changes → new "question session" needs Start. */
        var monacoGeneration = 0;
        var armedGeneration = -1;
        /** Used to avoid double “Start” bumps when SPA routing already incremented generation. */
        var lastRoutingBumpAt = 0;
        var overlayEl = null;

        var originalDateNow = Date.now.bind(Date);

        function resetAcceptedFreezeForNavigation() {
          freezeTimer = false;
          frozenNow = null;
        }

        function isAuthLikePath() {
          var path = (location.pathname || "").toLowerCase();
          return (
            path === "/login" ||
            path === "/signup" ||
            path === "/register"
          );
        }

        function hasMonacoEditor() {
          return !!document.querySelector(".monaco-editor");
        }

        function injectStartOverlayStyles() {
          if (document.getElementById("__ccodelab_start_styles")) return;
          var st = document.createElement("style");
          st.id = "__ccodelab_start_styles";
          st.textContent =
            "@keyframes __ccodelab_spin{to{transform:rotate(360deg)}}" +
            "#__ccodelab_question_start_overlay .__ccodelab_start_spinner{" +
            "width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.35);" +
            "border-top-color:#fff;animation:__ccodelab_spin .7s linear infinite;flex-shrink:0;" +
            "display:none" +
            "}" +
            "#__ccodelab_question_start_overlay.__ccodelab_loading .__ccodelab_start_spinner{display:block}" +
            "#__ccodelab_question_start_overlay.__ccodelab_loading .__ccodelab_start_btn{" +
            "opacity:.9;cursor:wait" +
            "}";
          document.head.appendChild(st);
        }

        function ensureOverlay() {
          injectStartOverlayStyles();
          if (overlayEl) return overlayEl;
          overlayEl = document.createElement("div");
          overlayEl.id = "__ccodelab_question_start_overlay";
          overlayEl.style.cssText = [
            "position:fixed",
            "inset:0",
            "z-index:2147483646",
            "display:flex",
            "align-items:flex-end",
            "justify-content:center",
            "pointer-events:none",
            "background:transparent",
            "font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif",
            "padding:0 16px max(20px, env(safe-area-inset-bottom))",
          ].join(";");
          var card = document.createElement("div");
          card.style.cssText = [
            "pointer-events:auto",
            "max-width:min(520px, 100%)",
            "width:100%",
            "margin-bottom:12px",
            "padding:14px 18px",
            "border-radius:999px",
            "display:flex",
            "flex-wrap:wrap",
            "align-items:center",
            "justify-content:center",
            "gap:12px 16px",
            "background:rgba(30,41,59,0.92)",
            "border:1px solid rgba(148,163,184,0.35)",
            "box-shadow:0 12px 40px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.04) inset",
          ].join(";");
          var msg = document.createElement("div");
          msg.style.cssText =
            "flex:1 1 220px;min-width:180px;text-align:center;line-height:1.45;font-size:13px;color:#e2e8f0";
          msg.innerHTML =
            '<span style="display:block;font-weight:600;color:#f8fafc;margin-bottom:4px">Timer paused</span>' +
            '<span style="opacity:.9">Click <strong style="color:#fff">Start</strong> when ready — the workspace stays visible.</span>';
          var btnWrap = document.createElement("div");
          btnWrap.style.cssText = "display:flex;align-items:center;gap:0";
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "__ccodelab_start_btn";
          btn.setAttribute("aria-busy", "false");
          var spinner = document.createElement("span");
          spinner.className = "__ccodelab_start_spinner";
          spinner.setAttribute("aria-hidden", "true");
          var btnLabel = document.createElement("span");
          btnLabel.className = "__ccodelab_start_label";
          btnLabel.textContent = "Start";
          btn.appendChild(spinner);
          btn.appendChild(btnLabel);
          btn.style.cssText =
            "background:linear-gradient(180deg,#3b82f6,#2563eb);color:#fff;border:none;padding:12px 28px;" +
            "font-size:15px;font-weight:700;border-radius:999px;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.45);" +
            "display:inline-flex;align-items:center;gap:10px;transition:transform .15s ease, box-shadow .15s ease;" +
            "min-width:160px;justify-content:center";
          btn.onmouseenter = function () {
            if (overlayEl.classList.contains("__ccodelab_loading")) return;
            btn.style.transform = "translateY(-1px)";
            btn.style.boxShadow = "0 6px 18px rgba(37,99,235,.55)";
          };
          btn.onmouseleave = function () {
            btn.style.transform = "";
            btn.style.boxShadow = "0 4px 14px rgba(37,99,235,.45)";
          };
          btn.onclick = function () {
            if (overlayEl.classList.contains("__ccodelab_loading")) return;
            overlayEl.classList.add("__ccodelab_loading");
            btn.disabled = true;
            btn.setAttribute("aria-busy", "true");
            btnLabel.textContent = "Starting…";
            window.setTimeout(function () {
              releaseQuestionGate();
              if (!overlayEl) return;
              overlayEl.classList.remove("__ccodelab_loading");
              btn.disabled = false;
              btn.setAttribute("aria-busy", "false");
              btnLabel.textContent = "Start";
            }, 420);
          };
          btnWrap.appendChild(btn);
          card.appendChild(msg);
          card.appendChild(btnWrap);
          overlayEl.appendChild(card);
          return overlayEl;
        }

        function showStartOverlay() {
          var layer = ensureOverlay();
          if (!layer.parentNode) {
            document.body.appendChild(layer);
          }
          layer.style.display = "flex";
        }

        function hideStartOverlay() {
          if (!overlayEl) return;
          overlayEl.style.display = "none";
          try {
            overlayEl.remove();
          } catch (_e) {}
          overlayEl = null;
        }

        function armQuestionGate() {
          gateActive = true;
          gateFrozenNow = originalDateNow();
          showStartOverlay();
        }

        function releaseQuestionGateQuiet() {
          gateActive = false;
          gateFrozenNow = null;
          hideStartOverlay();
        }

        function releaseQuestionGate() {
          releaseQuestionGateQuiet();
          armedGeneration = monacoGeneration;
        }

        function maybeArmGateForCodingView() {
          if (isAuthLikePath() || !hasMonacoEditor()) {
            releaseQuestionGateQuiet();
            armedGeneration = -1;
            return;
          }
          if (monacoGeneration !== armedGeneration) {
            armQuestionGate();
          }
        }

        function bumpMonacoGeneration() {
          monacoGeneration++;
          queueMicrotask(maybeArmGateForCodingView);
        }

        function patchHistory() {
          ["pushState", "replaceState"].forEach(function (methodName) {
            var orig = history[methodName];
            if (typeof orig !== "function") return;
            history[methodName] = function () {
              var prev = location.pathname + location.search + location.hash;
              var ret = orig.apply(this, arguments);
              var next = location.pathname + location.search + location.hash;
              resetAcceptedFreezeForNavigation();
              if (prev !== next) {
                lastRoutingBumpAt = originalDateNow();
                bumpMonacoGeneration();
              } else queueMicrotask(maybeArmGateForCodingView);
              return ret;
            };
          });
          window.addEventListener("popstate", function () {
            resetAcceptedFreezeForNavigation();
            lastRoutingBumpAt = originalDateNow();
            bumpMonacoGeneration();
          });
        }

        patchHistory();

        Date.now = function () {
          if (freezeTimer && typeof frozenNow === "number") {
            return frozenNow;
          }
          if (gateActive && typeof gateFrozenNow === "number") {
            return gateFrozenNow;
          }
          return originalDateNow();
        };

        function markAccepted(data) {
          if (!data || typeof data !== "object") {
            return;
          }
          if (data.status === "Accepted") {
            freezeTimer = true;
            frozenNow = originalDateNow();
            return;
          }
          if (
            typeof data.passed_case_count === "number" &&
            typeof data.total_case_count === "number" &&
            data.total_case_count > 0 &&
            data.passed_case_count === data.total_case_count
          ) {
            freezeTimer = true;
            frozenNow = originalDateNow();
          }
        }

        try {
          var hadMonaco = false;
          var mo = new MutationObserver(function () {
            var has = hasMonacoEditor();
            if (has && !hadMonaco && !isAuthLikePath()) {
              hadMonaco = true;
              bumpMonacoGeneration();
            }
            if (!has && hadMonaco) {
              hadMonaco = false;
              releaseQuestionGateQuiet();
              armedGeneration = -1;
            }
          });
          mo.observe(document.documentElement, { childList: true, subtree: true });
        } catch (_e2) {}

        window.addEventListener("hashchange", function () {
          resetAcceptedFreezeForNavigation();
          lastRoutingBumpAt = originalDateNow();
          bumpMonacoGeneration();
        });

        function parseJudgeSubmitMode(init) {
          try {
            if (!init || !init.method || init.method.toUpperCase() !== "POST") return null;
            if (!init.body || typeof init.body !== "string") return null;
            var body = JSON.parse(init.body);
            if (body && body.mode === "submit") return true;
          } catch (_ignored) {}
          return null;
        }

        function isJudgeAccepted(data) {
          if (!data || typeof data !== "object") return false;
          if (data.status === "Accepted") return true;
          return (
            typeof data.passed_case_count === "number" &&
            typeof data.total_case_count === "number" &&
            data.total_case_count > 0 &&
            data.passed_case_count === data.total_case_count
          );
        }

        queueMicrotask(maybeArmGateForCodingView);
        window.addEventListener("load", function () {
          maybeArmGateForCodingView();
        });

        var originalFetch = window.fetch;
        window.fetch = function (input, init) {
          var normalizedInput = input;
          var judgeSubmitHint = parseJudgeSubmitMode(init);
          var requestUrl = "";
          if (typeof input === "string") {
            requestUrl = input;
          } else if (input && input.url) {
            requestUrl = input.url;
          }
          var isJudgePath =
            /(^|\/)api\/judge\/c(\?|$)/.test(requestUrl) || /(^|\/)judge\/c(\?|$)/.test(requestUrl);
          var isAbsolute =
            /^https?:\/\//i.test(requestUrl) || requestUrl.startsWith("/") || requestUrl.startsWith("//");
          if (isJudgePath && !isAbsolute && typeof input === "string") {
            if (/api\/judge\/c(\?|$)/.test(requestUrl)) {
              normalizedInput = "/" + requestUrl.replace(/^\.?\/*/, "");
            } else {
              normalizedInput = "/judge/c";
              if (requestUrl.indexOf("?") !== -1) {
                normalizedInput += requestUrl.slice(requestUrl.indexOf("?"));
              }
            }
            requestUrl = normalizedInput;
          }
          return originalFetch.call(this, normalizedInput, init).then(function (response) {
            try {
              if (!/\/api\/judge\/c(\?|$)/.test(requestUrl)) {
                if (!/\/judge\/c(\?|$)/.test(requestUrl)) {
                  return response;
                }
              }
              if (!(response && response.ok)) {
                return response;
              }
              response
                .clone()
                .json()
                .then(function (data) {
                  markAccepted(data);
                  if (judgeSubmitHint && isJudgeAccepted(data)) {
                    window.setTimeout(function () {
                      resetAcceptedFreezeForNavigation();
                      if (originalDateNow() - lastRoutingBumpAt > 700) bumpMonacoGeneration();
                    }, 450);
                  }
                })
                .catch(function () {});
            } catch (e) {}
            return response;
          });
        };
      })();
    </script>
